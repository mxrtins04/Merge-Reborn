spring.application.name=Merge-

spring.data.mongodb.uri=mongodb://localhost:27017/merge?replicaSet=rs0
# both keys required in Spring Boot 4.1.0, spring.data.mongodb governs Spring Data mapping, spring.mongodb governs the core driver's UUID codec, confirmed empirically, removing either reintroduces CodecConfigurationException.
spring.data.mongodb.uuid-representation=standard
spring.mongodb.representation.uuid=standard
spring.data.redis.host=localhost
spring.data.redis.port=6379
jwt.signing-key=${JWT_SIGNING_KEY}

# Set to false in local dev (HTTP). True in staging and production (HTTPS).
cookie.secure=true

spring.docker.compose.enabled=false
spring.data.mongodb.auto-index-creation=true

management.endpoint.health.show-details=always

# Gemini API Integration
gemini.api.key=mock
gemini.model=gemini-1.5-flash

# Default encryption key fallback for local development and tests
encryption.key=${ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}

# RapidAPI Judge0 Integration
rapidapi.key=${RAPIDAPI_KEY:}

# Resilience4j — judge0-client instance (TimeLimiter + CircuitBreaker + Retry)
resilience4j.timelimiter.instances.judge0-client.timeout-duration=15s
resilience4j.circuitbreaker.instances.judge0-client.register-health-indicator=true
resilience4j.circuitbreaker.instances.judge0-client.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.judge0-client.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.judge0-client.sliding-window-size=5
resilience4j.retry.instances.judge0-client.max-attempts=3
resilience4j.retry.instances.judge0-client.wait-duration=500ms
# Do not retry on rate-limit hits — that would burn more quota
resilience4j.retry.instances.judge0-client.ignore-exceptions[0]=com.merge.merge.integration.judge0.Judge0RateLimitException
